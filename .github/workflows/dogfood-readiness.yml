name: Dogfood readiness

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  pr-body:
    name: PR evidence body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > /tmp/pr-body.md
      - name: Validate dogfood evidence sections
        run: python3 scripts/check_pr_body.py --body-file /tmp/pr-body.md

  tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s tests
      - run: python3 -m dogfood_readiness --target "ci smoke" --claim "CLI renders artifacts" --output /tmp/dogfood-readiness-smoke
